<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lucide</title>
<meta name="description" content="Building small sharp tools.">
<style>
  :root { --paper:#fdfcf9; --ink:#1c1b18; --soft:#6b675e; }
  @media (prefers-color-scheme: dark) { :root { --paper:#171613; --ink:#ebe7dd; --soft:#a29c8e; } }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100svh; display:grid; place-items:center;
    background:var(--paper); color:var(--ink);
    font: 1.1rem/1.6 "Iowan Old Style", Palatino, Georgia, serif; }
  main { padding:2rem; text-align:center; }
  h1 { font-size:clamp(2rem,6vw,3rem); margin:0 0 .3em; font-weight:600; }
  p { color:var(--soft); margin:0; }
  a { color:inherit; text-underline-offset:3px; }
</style>
</head>
<body>
<main>
  <h1>Lucide</h1>
  <p>Building small sharp tools.<br><a href="https://github.com/LucideLarp">github.com/LucideLarp</a></p>
</main>
</body>
</html>

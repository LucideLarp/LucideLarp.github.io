<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LucideLarp</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
.container { max-width: 600px; }
h1 { font-size: 3rem; margin-bottom: 1rem; }
p { font-size: 1.2rem; opacity: 0.85; line-height: 1.6; }
.dot { display: inline-block; width: 10px; height: 10px; background: #4ade80; border-radius: 50%; margin-right: 0.5rem; }
</style>
</head>
<body>
<div class="container">
<h1>Hello, world.</h1>
<p><span class="dot"></span>Site is live. More coming soon.</p>
</div>
</body>
</html>
